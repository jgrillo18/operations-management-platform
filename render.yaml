services:
  # ── PostgreSQL Database ───────────────────────────────────────────────────
  - type: pserv
    name: operations-db
    plan: free
    databaseName: operations
    user: postgres

  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  - type: web
    name: operations-backend
    plan: free
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: operations-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ── Frontend (React Static Site) ─────────────────────────────────────────
  - type: web
    name: operations-frontend
    plan: free
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false   # set manually after backend is deployed
      - key: NODE_VERSION
        value: "20.11.0"
