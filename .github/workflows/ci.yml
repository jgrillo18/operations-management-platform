name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       operations_test
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/operations_test

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check . --select E,F,W --ignore E501

      - name: Start app & smoke-test API
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 4
          curl -f http://localhost:8000/health
          curl -f http://localhost:8000/docs > /dev/null
          echo "Backend smoke test passed ✅"

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build (Vite)
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ── Docker ─────────────────────────────────────────────────────────────────
  docker:
    name: Docker Compose — Integration
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build all images
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Wait for backend to be healthy
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8000/health; then
              echo "Backend is up ✅"
              exit 0
            fi
            echo "Waiting… attempt $i"
            sleep 3
          done
          echo "Backend never became healthy ❌"
          docker compose logs backend
          exit 1

      - name: Run API integration tests
        run: |
          # Create a request
          ID=$(curl -sf -X POST http://localhost:8000/requests \
            -H "Content-Type: application/json" \
            -d '{"title":"CI Test Request","description":"Automated","priority":"HIGH"}' \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Created request ID: $ID"

          # List requests
          curl -sf http://localhost:8000/requests | python3 -c "import sys,json; data=json.load(sys.stdin); assert len(data)>0, 'Empty list'"
          echo "List requests ✅"

          # Update status
          curl -sf -X PUT "http://localhost:8000/requests/$ID" \
            -H "Content-Type: application/json" \
            -d '{"status":"IN_PROGRESS"}'
          echo "Update status ✅"

          # Audit log
          curl -sf http://localhost:8000/audit | python3 -c "import sys,json; data=json.load(sys.stdin); assert len(data)>0, 'Empty audit'"
          echo "Audit log ✅"

          # Delete
          curl -sf -X DELETE "http://localhost:8000/requests/$ID"
          echo "Delete ✅"

          echo "All integration tests passed 🎉"

      - name: Tear down
        if: always()
        run: docker compose down -v
